name: Validate infra
on:
  pull_request:
    branches:
    - prod
    - dev
jobs:
  validate-hcl:
    name: Validate HCL
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v1.2.1
      with:
        terraform_version: ${{ vars.TERRAFORM_VERSION }}
        terraform_wrapper: false
    - name: Install Terragrunt
      run: |
        echo "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ vars.TERRAGRUNT_VERSION }}/terragrunt_linux_amd64"
        curl -L https://github.com/gruntwork-io/terragrunt/releases/download/v${{ vars.TERRAGRUNT_VERSION }}/terragrunt_linux_amd64 -o terragrunt
        chmod +x terragrunt
        sudo mv terragrunt /usr/local/bin/terragrunt
    - name: Validate HCL
      run: terragrunt hcl validate --all
  plan-infra:
    name: Plan infra
    runs-on: ubuntu-latest
    needs: validate-hcl
    environment: ${{ github.base_ref }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ vars.AWS_REGION }}
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v1.2.1
      with:
        terraform_version: ${{ vars.TERRAFORM_VERSION }}
        terraform_wrapper: false
    - name: Install Terragrunt
      run: |
        curl -L https://github.com/gruntwork-io/terragrunt/releases/download/v${{ vars.TERRAGRUNT_VERSION }}/terragrunt_linux_amd64 -o terragrunt
        chmod +x terragrunt
        sudo mv terragrunt /usr/local/bin/terragrunt
    - name: Initialize infra
      run: terragrunt init --all --backend-bootstrap --non-interactive
    - name: Plan infra
      run: |
        cd env/${{ github.base_ref }}
        terragrunt plan --all --non-interactive --queue-include-external
