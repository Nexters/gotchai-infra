name: Deploy infra
on:
  push:
    branches:
    - prod
    - dev
jobs:
  deploy-infra:
    name: Deploy infra
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ vars.AWS_REGION }}
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v1.2.1
      with:
        terraform_version: ${{ vars.TERRAFORM_VERSION }}
        terraform_wrapper: false
    - name: Install Terragrunt
      run: |
        curl -L "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ vars.TERRAGRUNT_VERSION }}/terragrunt_linux_amd64" -o terragrunt
        chmod +x terragrunt
        sudo mv terragrunt /usr/local/bin/terragrunt
    - name: Initialize infra
      run: terragrunt init --all --backend-bootstrap --non-interactive
    - name: Plan infra
      run: |
        cd env/${{ github.ref_name }}
        terragrunt plan --all --non-interactive --queue-include-external
    - name: Apply infra
      run: |
        cd env/${{ github.ref_name }}
        terragrunt apply --all --non-interactive --queue-include-external
  notify-discord:
    name: Notify Discord
    runs-on: ubuntu-latest
    needs: deploy-infra
    if: always()
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Get commit
      id: get_commit
      run: echo "commit_message=$(git log -1 --pretty=%s)" >> "$GITHUB_OUTPUT"
    - name: Send Discord notification
      run: |
        curl -X POST -H "Content-Type: application/json" -d '{
          "username": "GitHub Actions",
          "avatar_url": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
          "embeds": [
            {
              "title": "**인프라 ${{ github.ref_name == 'prod' && '프로덕션' || '개발' }} 환경 배포 ${{ needs.deploy-infra.result == 'success' && '성공' || '실패' }}**",
              "description": ${{ needs.deploy-infra.result == 'success' && 'AWS 인프라가 성공적으로 배포되었습니다.' || 'AWS 인프라 배포에 실패했습니다.' }},
              "color": ${{ needs.deploy-infra.result == 'success' && 3066993 || 15158332 }},
              "fields": [
                {
                  "name": "Repository",
                  "value": "[${{ github.repository }}](https://github.com/${{ github.repository }})",
                  "inline": true
                },
                {
                  "name": "Branch",
                  "value": "${{ github.ref_name }}",
                  "inline": true
                },
                {
                  "name": "Commit",
                  "value": "[${{ steps.get_commit.outputs.commit_message }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})",
                  "inline": true
                },
                {
                  "name": "Deployment",
                  "value": "[${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})",
                  "inline": true
                },
                {
                  "name": "Author",
                  "value": "[${{ github.actor }}](${{ github.event.sender.html_url }})",
                  "inline": true
                }
              ]
            }
          ]
        }' ${{ secrets.DISCORD_WEBHOOK_URL }}
